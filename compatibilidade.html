<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="compatibilidade.css">
    <title>Compatibilidade - GamerLabs</title>
</head>
<body>

<!-- Top bar com logo e menu -->
<header class="top-bar">
    <img src="gamerlabs.png" class="logo" alt="GamerLabs">
    <div class="hamburger" id="menu-toggle">☰</div>
</header>

<!-- Sidebar da página de compatibilidade, onde o menu lateral abre -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="gamerlabs.png" class="logo-small" alt="Logo">
        <span class="close-btn" id="close-sidebar">✕</span>
    </div>
    <ul>
        <li><a href="tutoriais.html">Tutoriais</a></li>
        <li><a href="pecas.html">O que cada peça faz</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="eSports.html">eSports</a></li>
    </ul>
</nav>

<main>
    <h1>Verificador de Compatibilidade</h1>
    <p class="desc">Selecione as peças abaixo e clique em "Verificar".</p>

    <div class="selector-grid">
        <div class="field">
            <label for="cpu">Processador (CPU)</label>
            <div class="search-wrapper">
                <input type="text" id="cpu-search" class="search-input" placeholder="Buscar CPU..." autocomplete="off">
                <span class="search-icon"></span>
                <div id="cpu-suggestions" class="suggestions-dropdown"></div>
            </div>
            <input type="hidden" id="cpu">
        </div>
        <div class="field">
            <label for="mobo">Placa-mãe</label>
            <div class="search-wrapper">
                <input type="text" id="mobo-search" class="search-input" placeholder="Buscar placa-mãe..." autocomplete="off">
                <span class="search-icon"></span>
                <div id="mobo-suggestions" class="suggestions-dropdown"></div>
            </div>
            <input type="hidden" id="mobo">
        </div>
        <div class="field">
            <label for="gpu">Placa de vídeo (GPU)</label>
            <div class="search-wrapper">
                <input type="text" id="gpu-search" class="search-input" placeholder="Buscar GPU..." autocomplete="off">
                <span class="search-icon"></span>
                <div id="gpu-suggestions" class="suggestions-dropdown"></div>
            </div>
            <input type="hidden" id="gpu">
        </div>
        <div class="field">
            <label for="ram">Memória RAM</label>
            <div class="search-wrapper">
                <input type="text" id="ram-search" class="search-input" placeholder="Buscar RAM..." autocomplete="off">
                <span class="search-icon"></span>
                <div id="ram-suggestions" class="suggestions-dropdown"></div>
            </div>
            <input type="hidden" id="ram">
        </div>
        <div class="field">
            <label for="psu">Fonte (PSU)</label>
            <div class="search-wrapper">
                <input type="text" id="psu-search" class="search-input" placeholder="Buscar fonte..." autocomplete="off">
                <span class="search-icon"></span>
                <div id="psu-suggestions" class="suggestions-dropdown"></div>
            </div>
            <input type="hidden" id="psu">
        </div>
        <div class="field">
            <label for="case">Gabinete</label>
            <div class="search-wrapper">
                <input type="text" id="case-search" class="search-input" placeholder="Buscar gabinete..." autocomplete="off">
                <span class="search-icon"></span>
                <div id="case-suggestions" class="suggestions-dropdown"></div>
            </div>
            <input type="hidden" id="case">
        </div>
    </div>

    <button id="check-btn" class="btn-primary">Verificar Compatibilidade</button>

    <div id="result" class="result-box"></div>
</main>



<script src="pecas.js"></script>
<script src="compatibilidade.js"></script>
</body>
</html>
